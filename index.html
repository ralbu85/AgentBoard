<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>TermHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cascadia+Code&display=swap">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/theme/material-darker.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/stex/stex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/javascript/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/python/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/css/css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/xml/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/markdown/markdown.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/yaml/yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/shell/shell.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/sql/sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5/addon/edit/closebrackets.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="stylesheet" href="/style.css?v=28">
</head>
<body>

<div id="login" style="display:none">
  <h2 style="font-size:20px">TermHub</h2>
  <input id="pw" type="password" placeholder="Password" />
  <button id="login-btn">Login</button>
  <span id="login-err">Incorrect password</span>
</div>

<div id="app" style="display:none;flex-direction:column;height:100dvh;overflow:hidden">
  <header>
    <div id="status-dot" class="off"></div>
    <h1>TermHub</h1>
    <div class="layout-group">
      <button id="layout-overview-btn" class="header-btn layout-active">Overview</button>
      <button id="layout-tab-btn" class="header-btn">Tab</button>
      <button id="layout-split-btn" class="header-btn">Split</button>
    </div>
    <div class="header-divider"></div>
    <button id="notify-btn" class="header-btn">🔔</button>
    <button id="sidepanel-btn" class="header-btn" title="Side Panel (Ctrl+B)">☰</button>
    <button id="scan-btn" class="header-btn">🔍</button>
    <button id="toggle-toolbar-btn" class="header-btn accent">+</button>
  </header>

  <div id="summary-bar"></div>

  <!-- Overview mode -->
  <div id="overview-mode" style="flex:1;overflow-y:auto;display:none">
    <div id="overview-content"></div>
  </div>

  <div id="spawn-panel" style="display:none">
    <div class="browse-path" id="browse-path">/</div>
    <div class="browse-list" id="browse-list"></div>
    <div class="spawn-panel-footer">
      <div class="bookmark-list" id="bookmark-list"></div>
      <div class="spawn-panel-actions">
        <button class="bookmark-add" onclick="addBookmark()">+ Bookmark</button>
        <button class="spawn-create-btn" onclick="spawnFromBrowser()">Open here</button>
      </div>
    </div>
  </div>

  <!-- Tab mode -->
  <div id="tab-mode" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div id="tab-bar"></div>
    <div id="tab-body" style="display:flex;flex:1;overflow:hidden">
      <div id="tab-content"></div>
      <div id="sp-drag" style="display:none"></div>
      <div id="side-panel" style="display:none">
        <div id="sp-tabs">
          <button class="sp-tab active" data-sp="files">Files</button>
          <button class="sp-tab" data-sp="editor">Editor</button>
          <button class="sp-tab" data-sp="history">History</button>
          <button class="sp-close">&times;</button>
        </div>
        <div id="sp-files" class="sp-content">
          <div id="sp-files-header" style="display:flex;align-items:center">
            <div id="sp-files-path" class="sp-path" style="flex:1"></div>
            <button id="sp-files-refresh" class="sp-btn" style="margin:0 6px" title="Refresh">↻</button>
          </div>
          <div id="sp-files-list" class="sp-list"></div>
        </div>
        <div id="sp-editor" class="sp-content" style="display:none">
          <div id="sp-editor-bar">
            <span id="sp-editor-name">No file open</span>
            <button id="sp-refresh-btn" class="sp-btn" title="Reload file">↻</button>
            <button id="sp-preview-btn" class="sp-btn">Preview</button>
            <button id="sp-save-btn" class="sp-btn">Save</button>
          </div>
          <textarea id="sp-editor-area" placeholder="Open a file from the Files tab..."></textarea>
          <div id="sp-editor-preview"></div>
        </div>
        <div id="sp-history" class="sp-content" style="display:none">
          <div id="sp-history-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Split mode -->
  <div id="split-mode" style="flex:1;overflow:hidden;display:none">
    <div id="split-content"></div>
  </div>
</div>

<script src="/js/ansi.js?v=28"></script>
<script src="/js/layout.js?v=28"></script>
<script src="/js/favorites.js?v=28"></script>
<script src="/js/ws.js?v=28"></script>
<script src="/js/workers.js?v=28"></script>
<script src="/js/sidepanel.js?v=28b"></script>
<script src="/js/app.js?v=28"></script>
</body>
</html>
